name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: |
          curl -sO https://gifcap.dev/encoder/encoder.js
          curl -sO https://gifcap.dev/encoder/encoder.wasm
          mv encoder.js encoder.wasm encoder/
      - run: npm run dist:js
      - run: npx electron-builder --mac --config.mac.identity=null
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: |
          curl -sO https://gifcap.dev/encoder/encoder.js
          curl -sO https://gifcap.dev/encoder/encoder.wasm
          mv encoder.js encoder/
          mv encoder.wasm encoder/
        shell: bash
      - run: npm run dist:js
      - run: npx electron-builder --win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/win
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
